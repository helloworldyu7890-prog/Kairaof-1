<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BurmaYoYar-HD - Premium Mobile</title>
    
    <script src="https://pl30149725.effectivecpmnetwork.com/72/36/71/723671d6fb365692e8aae17ed2085563.js"></script>
    <script src="https://pl30149726.effectivecpmnetwork.com/22/3d/45/223d45507315c360b0744fa53a9dbbfc.js"></script>

    <style>
        :root {
            --bg-dark-matte: #130E0B;
            --velvet-crimson: #E50914;
            --luxury-gold: #C59B6D;
            --card-dark-bg: #1A1412;
            --text-gold: #D4AF37;
            --text-light: #EAD9CB;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; }
        body { background-color: var(--bg-dark-matte); color: var(--text-light); display: flex; justify-content: center; }

        .app-container { width: 100%; max-width: 480px; background-color: var(--bg-dark-matte); min-height: 100vh; overflow-x: hidden; }

        /* Smooth Content Animation */
        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .content-transition { animation: fadeInSlide 0.6s cubic-bezier(0.22, 1, 0.36, 1); }

        /* Hero Banner Animation */
        .hero-banner-section {
            background: linear-gradient(180deg, rgba(74, 18, 26, 0.9) 0%, rgba(13, 14, 11, 1) 100%);
            padding: 30px 20px;
            animation: heroFadeIn 1s ease-in-out;
        }
        @keyframes heroFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Header Style */
        header { background-color: var(--card-dark-bg); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(197, 155, 109, 0.15); position: sticky; top: 0; z-index: 1000; }
        .header-brand h2 { font-size: 18px; text-transform: uppercase; cursor: pointer; }
        .part-burma { color: var(--text-gold); font-weight: 900; }
        .part-yoyar { color: #ff3344; font-weight: 900; }
        .part-hd { color: #FFFFFF; font-weight: 900; }

        /* Search Bar */
        .search-container { padding: 12px 14px; }
        .search-box { display: flex; background: var(--card-dark-bg); border: 1px solid rgba(197, 155, 109, 0.25); border-radius: 8px; overflow: hidden; }
        .search-box input { flex-grow: 1; background: transparent; border: none; padding: 12px; color: #fff; font-size: 12px; outline: none; }
        .search-btn { background: rgba(197, 155, 109, 0.15); border: none; color: var(--text-gold); padding: 0 16px; font-weight: bold; cursor: pointer; }

        /* Animated Text */
        #animatedTitle { font-size: 13px; color: var(--text-gold); font-weight: 800; margin-bottom: 8px; border-right: 2px solid var(--text-gold); width: fit-content; white-space: nowrap; overflow: hidden; }
        #animatedBody { font-size: 12px; font-weight: 500; color: #EAD9CB; min-height: 50px; }

        /* Card Styles */
        .shakes-style-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 14px; }
        .shake-premium-card { background: #16110F; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .shake-thumb-placeholder { width: 100%; aspect-ratio: 16/10; background: #000; }
        .shake-thumb-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        .shake-card-info { padding: 10px; }
        .shake-card-info h4 { font-size: 11px; margin-bottom: 6px; }
        .shake-watch-btn { color: #fff; background: var(--velvet-crimson); font-size: 8px; padding: 3px 8px; border-radius: 4px; display: inline-block; }

        .loader { display: block; margin: 15px auto; border: 2px solid rgba(255,255,255,0.05); border-top: 2px solid var(--luxury-gold); border-radius: 50%; width: 22px; height: 22px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="header-brand" onclick="backToHome()">
            <h2><span class="part-burma">Burma</span><span class="part-yoyar">YoYar</span><span class="part-hd">-HD</span></h2>
        </div>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="userSearchInput" placeholder="ဇာတ်ကားအမည်ဖြင့် ရှာဖွေပါ...">
            <button class="search-btn" onclick="triggerSearch()">ရှာပါ</button>
        </div>
    </div>

    <div class="hero-banner-section">
        <div id="animatedTitle"></div>
        <div id="animatedBody"></div>
    </div>

    <div class="main-body-content content-transition" id="mainContent">
        <!-- Categories -->
        <div style="display: flex; gap: 10px; padding: 14px; overflow-x: auto;">
            <button onclick="fetchNewCategory('myanmar')" style="padding: 8px 15px; border-radius: 20px; border: 1px solid var(--luxury-gold); background: transparent; color: var(--luxury-gold);">Myanmar</button>
            <button onclick="fetchNewCategory('japan')" style="padding: 8px 15px; border-radius: 20px; border: 1px solid var(--luxury-gold); background: transparent; color: var(--luxury-gold);">Japan AV</button>
            <button onclick="fetchNewCategory('asian')" style="padding: 8px 15px; border-radius: 20px; border: 1px solid var(--luxury-gold); background: transparent; color: var(--luxury-gold);">Asian</button>
        </div>

        <div class="shakes-style-grid" id="shakesGrid"></div>
        <div class="loader" id="networkLoader" style="display:none;"></div>
    </div>
</div>

<script>
    const API_URL = 'https://www.eporner.com/api/v2/video/search/';
    
    // Typing Animation
    function typeEffect(element, text, speed) {
        let i = 0;
        function typing() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(typing, speed);
            }
        }
        typing();
    }

    document.addEventListener("DOMContentLoaded", () => {
        typeEffect(document.getElementById("animatedTitle"), "ပရီမီယမ် ရသခံစားမှု့", 100);
        setTimeout(() => {
            typeEffect(document.getElementById("animatedBody"), "မြန်မာကားများတင်သာမက VIP , LOCAL LEAK , အဆင့်မြင့် အာရှ ဇာတ်ကားပေါင်းများစွာကို ပရီမီယမ်ဆန်စွာ အခမဲ့ အဆင့်မြင့်မြင့် ကြည့်ရှုနိူင်ပြီ!", 30);
        }, 1500);
        fetchNewCategory('myanmar');
    });

    async function fetchNewCategory(cat) {
        // Animation Trigger
        const content = document.getElementById("mainContent");
        content.classList.remove("content-transition");
        void content.offsetWidth; // Force reflow
        content.classList.add("content-transition");

        document.getElementById("shakesGrid").innerHTML = "";
        const res = await fetch(`${API_URL}?query=${cat}&per_page=10`);
        const data = await res.json();
        
        data.videos.forEach(v => {
            const card = document.createElement("div");
            card.className = "shake-premium-card";
            card.innerHTML = `
                <div class="shake-thumb-placeholder"><img src="${v.default_thumb.src}"></div>
                <div class="shake-card-info">
                    <h4>${v.title}</h4>
                    <span class="shake-watch-btn">Watch Now</span>
                </div>
            `;
            document.getElementById("shakesGrid").appendChild(card);
        });
    }

    function triggerSearch() {
        fetchNewCategory(document.getElementById("userSearchInput").value);
    }
</script>

</body>
</html>
